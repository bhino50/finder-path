name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    name: Build FinderPath macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate project files
        run: |
          plutil -lint Info.plist
          plutil -lint FinderPath.entitlements
          ruby -rjson -e 'ARGV.each { |path| JSON.parse(File.read(path)) }' \
            FinderPath/Assets.xcassets/Contents.json \
            FinderPath/Assets.xcassets/AppIcon.appiconset/Contents.json \
            FinderPath/Assets.xcassets/AccentColor.colorset/Contents.json \
            download-site/version.json \
            download-site/vercel.json
          bash -n script/build_and_run.sh
          bash -n script/run_no_xcode.sh
          bash -n script/test_logic.sh
          bash -n script/package_release.sh

      - name: Run logic tests
        run: ./script/test_logic.sh

      - name: Build Debug app
        run: |
          xcodebuild \
            -project FinderPath.xcodeproj \
            -scheme FinderPath \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Release app
        run: |
          xcodebuild \
            -project FinderPath.xcodeproj \
            -scheme FinderPath \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath .build/ReleaseDerivedData \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build without xcodebuild
        run: ./script/run_no_xcode.sh build
